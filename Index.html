<!DOCTYPE html>
<html>
<head>
  <title>My Page</title>
  <style>
     

.left{
  position: fixed;
  left: 0;
  top: 0;
  width: 40%;
  height: 100vh;
  background-image: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.content {
  position: absolute;
  top: 50%;
  left: 0;
  width: 100%;
  transform: translateY(-50%);
  text-align: center;
  background-color: rgba(0, 0, 0, 0.3); 
}




.logo-img {
  vertical-align: middle;
  width: 40px;
  height: 40px;
  margin-right: 10px;
    
}


.right {
  position: fixed;
  right: 0;
  top: 0;
  width: 60%;
  height: 100vh;
  background-color: #f4f4f4;
  padding: 24px;
}

.right h1.info {
  font-size: 24px;
  margin-bottom: 20px;
}


.row {
  display: flex;          
  gap: 20px;              
}

.form-group {
  display: flex;
  flex-direction: column;    
  flex: 1;                   
}

/* Label styling */
.form-group label {
  margin-bottom: 5px;
  font-weight: bold;
}

/* Input styling */
.form-group input {
  padding: 10px;
  font-size: 16px;
  border: 1px solid #E5E7EB;
  border-radius: 5px;
}
input:focus:valid{
  border-color: blue;
}

input:focus:invalid{
  border-color: red;
  
}

input[type="password"]:invalid {
  border-color: red;
}

input[type="password"]:valid {
  border-color: green;
}

/* Button styling */
button {
  margin-top: 20px;
  padding: 10px;
  width: 30%;
  font-size: 16px;
  border-radius: 5px;
  border: none;
  background-color: #596D48;
  color: white;
  cursor: pointer;
}
    
  </style>
  
</head>
<body>

  <div class="left">
    <div>
    <h1 class="content">
  <img src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png" alt="Odin logo" class="logo-img">
  ODIN
</h1>
    </div>
  </div>
  
  <div class="right">
  <h1 class="info">
    This is not a real workplace, but there is something you have to understand right now. It is very important to you and you need it.
  </h1>

  <div>
    <div>
    <form>

  
  <h1>Lets do this</h1>
      <fieldset>
  <div class="row">
    <div class="form-group">
      <label for="fName">First Name</label>
      <input type="text" id="fName" name="fname" placeholder="First Name" minlength="3" required>
    </div>

    <div class="form-group">
      <label for="lName">Last Name</label>
      <input type="text" id="lName" name="lname" placeholder="Last Name" minlength="3" required>
    </div>
  </div>
  
   <div class="row">
    <div class="form-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="Email" required>
    </div>

    <div class="form-group">
      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="Phone number" required>
    </div>
  </div>
  
   <div class="row">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required>
    </div>

    <div class="form-group">
      <label for="password">Confirm password</label>
      <input type="password" id="password" name="password" placeholder="Confirm password" required>
    </div>
  </div>
  </fieldset>

  <button type="submit">Create account</button>
</form>
<h2>You already have an account? 
<span style="color: #596D48;">Log in</span></h2>
  </div>
</div>
  
</body>
</html>
